<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Mercado + Cashea</title>
    <style>
        :root {
            --bg: #0F0F1A;
            --bg-card: #1A1A2E;
            --bg-input: #16213E;
            --text: #EAEAEA;
            --text-muted: #8888AA;
            --border: #2A2A4A;
            --primary: #6C5CE7;
            --primary-dark: #5A4BD1;
            --accent: #00CEC9;
            --cashea-yellow: #FFD700;
            --expense-red: #FF4757;
            --radius: 16px;
            --radius-sm: 10px;
        }

        body.light-theme {
            --bg: #F5F5F5;
            --bg-card: #FFFFFF;
            --bg-input: #F0F0F5;
            --text: #1A1A2E;
            --text-muted: #666688;
            --border: #D0D0E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: all 0.3s;
        }

        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-theme {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
        }

        .header-info {            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .info-chip {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            flex: 1;
            min-width: 0;
        }

        .info-chip .chip-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .info-chip .chip-value {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--accent);
        }

        .info-chip select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px;
            color: var(--text);
            font-size: 0.85rem;
            width: 100%;
            margin-top: 4px;
        }

        .add-form {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin: 16px;
        }

        .add-form h3 {
            margin-bottom: 12px;
            color: var(--primary);
        }
        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: block;
            margin-bottom: 4px;
        }

        .form-group input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            color: var(--text);
            width: 100%;
            font-size: 0.9rem;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .product-list {
            margin: 0 16px 16px;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .product-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
        }

        .product-details {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .product-price {
            text-align: right;
        }

        .product-price-usd {
            font-weight: 700;
            color: var(--accent);
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--expense-red);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
        }

        .totals-section {            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin: 0 16px 16px;
            overflow: hidden;
        }

        .total-row {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .total-row:last-child {
            border-bottom: none;
        }

        .total-row.cashea {
            background: rgba(255, 215, 0, 0.1);
        }

        .total-row.expense {
            background: rgba(255, 71, 87, 0.1);
        }

        .total-row.expense .total-usd {
            color: var(--expense-red);
        }

        .total-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .total-usd {
            font-weight: 700;
            font-size: 1rem;
        }

        .total-bs {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .cashea-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;            height: 20px;
            background: var(--cashea-yellow);
            border-radius: 50%;
            margin-right: 6px;
        }

        .cashea-logo span {
            font-weight: 900;
            color: #1A1A1A;
            font-size: 0.7rem;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            display: none;
            z-index: 1000;
        }

        .toast.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head><body>

<header class="header">
    <div class="header-top">
        <h1>Mi Mercado</h1>
        <div class="header-actions">
            <button class="btn btn-theme" id="themeBtn" onclick="toggleTheme()">Tema</button>
            <button class="btn btn-primary" onclick="alert('Calculadora en desarrollo')">Calculadora</button>
        </div>
    </div>
    <div class="header-info">
        <div class="info-chip">
            <div class="chip-label">Tasa BCV</div>
            <div class="chip-value" id="rateDisplay">
                <span class="loading"></span>
            </div>
        </div>
        <div class="info-chip">
            <div class="chip-label">Nivel Cashea</div>
            <select id="casheaLevel" onchange="updateTotals()">
                <option value="1">Nivel 1 - 60%</option>
                <option value="2" selected>Nivel 2 - 50%</option>
                <option value="3">Nivel 3 - 40%</option>
            </select>
        </div>
    </div>
</header>

<div class="add-form">
    <h3>Agregar Producto</h3>
    <div class="form-row">
        <div class="form-group" style="flex:2">
            <label>Producto</label>
            <input type="text" id="prodName" placeholder="Ej: Harina Pan">
        </div>
        <div class="form-group">
            <label>Cantidad</label>
            <input type="number" id="prodQty" value="1" min="1">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Precio Unitario ($)</label>
            <input type="number" id="prodPrice" placeholder="0.00" step="0.01" min="0">
        </div>
    </div>
    <button class="btn-add" onclick="addProduct()">Agregar</button>
</div>

<div class="product-list">    <div class="list-header">
        <h3>Mi Lista (<span id="itemCount">0</span>)</h3>
        <button class="btn" style="background:var(--bg-input); color:var(--text)" onclick="clearList()">Borrar todo</button>
    </div>
    <div id="productList">
        <div class="empty-state">
            <p>Tu lista esta vacia</p>
        </div>
    </div>
</div>

<div class="totals-section" id="totalsSection" style="display:none">
    <div class="total-row">
        <span class="total-label">Total lista</span>
        <div>
            <div class="total-usd" id="totalUsd">$0.00</div>
            <div class="total-bs" id="totalBs">Bs. 0,00</div>
        </div>
    </div>
    <div class="total-row">
        <span class="total-label">Seleccionado</span>
        <div>
            <div class="total-usd" id="checkedUsd">$0.00</div>
            <div class="total-bs" id="checkedBs">Bs. 0,00</div>
        </div>
    </div>
    <div class="total-row cashea">
        <span class="total-label">
            <div class="cashea-logo"><span>C</span></div>
            Monto a financiar (Cashea)
        </span>
        <div>
            <div class="total-usd" id="casheaUsd">$0.00</div>
            <div class="total-bs" id="casheaBs">Bs. 0,00</div>
        </div>
    </div>
    <div class="total-row expense">
        <span class="total-label">Pago inicial</span>
        <div>
            <div class="total-usd" id="userPayUsd">$0.00</div>
            <div class="total-bs" id="userPayBs">Bs. 0,00</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
let dollarRate = 0;
let products = [];
const CASHEA_LEVELS = {
    1: 0.60,
    2: 0.50,
    3: 0.40
};

// Inicializar
document.addEventListener('DOMContentLoaded', function() {
    console.log('App iniciada');
    fetchRate();
    loadProducts();
    loadTheme();
});

// Cargar tema
function loadTheme() {
    const savedTheme = localStorage.getItem('theme');
    console.log('Tema guardado:', savedTheme);
    if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
    }
}

// Cambiar tema
function toggleTheme() {
    console.log('Cambiando tema');
    document.body.classList.toggle('light-theme');
    const isLight = document.body.classList.contains('light-theme');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    console.log('Tema actual:', isLight ? 'claro' : 'oscuro');
}

// Obtener tasa
async function fetchRate() {
    const display = document.getElementById('rateDisplay');
    try {
        // Intentar con pydolarve
        const response = await fetch('https://pydolarve.org/api/v1/dollar?page=bcv');
        const data = await response.json();
        
        if (data && data.monitors && data.monitors.usd && data.monitors.usd.price) {
            dollarRate = data.monitors.usd.price;
            display.textContent = 'Bs. ' + dollarRate.toFixed(2);
            console.log('Tasa obtenida:', dollarRate);
            updateTotals();
        } else {
            throw new Error('Datos invalidos');
        }
    } catch (error) {        console.error('Error obteniendo tasa:', error);
        display.textContent = 'Error al cargar';
        // Tasa de respaldo
        dollarRate = 40.00;
        display.textContent = 'Bs. ' + dollarRate.toFixed(2) + ' (estimado)';
    }
}

// Agregar producto
function addProduct() {
    const nameInput = document.getElementById('prodName');
    const qtyInput = document.getElementById('prodQty');
    const priceInput = document.getElementById('prodPrice');
    
    const name = nameInput.value.trim();
    const qty = parseInt(qtyInput.value) || 1;
    const price = parseFloat(priceInput.value) || 0;
    
    console.log('Agregando:', name, qty, price);
    
    if (!name) {
        showToast('Ingresa el nombre del producto');
        return;
    }
    
    if (price <= 0) {
        showToast('Ingresa un precio valido');
        return;
    }
    
    const product = {
        id: Date.now(),
        name: name,
        qty: qty,
        price: price,
        checked: true
    };
    
    products.push(product);
    saveProducts();
    renderProducts();
    updateTotals();
    
    // Limpiar formulario
    nameInput.value = '';
    priceInput.value = '';
    qtyInput.value = '1';
    nameInput.focus();
    
    showToast('Producto agregado');}

// Renderizar lista
function renderProducts() {
    const container = document.getElementById('productList');
    const countEl = document.getElementById('itemCount');
    
    countEl.textContent = products.length;
    
    if (products.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>Tu lista esta vacia</p></div>';
        return;
    }
    
    let html = '';
    products.forEach(function(p) {
        const subtotal = p.qty * p.price;
        const subtotalBs = subtotal * dollarRate;
        
        html += '<div class="product-item">';
        html += '<input type="checkbox" class="product-checkbox" ' + (p.checked ? 'checked' : '') + ' onchange="toggleProduct(' + p.id + ')">';
        html += '<div class="product-info">';
        html += '<div class="product-name">' + p.name + '</div>';
        html += '<div class="product-details">' + p.qty + ' x $' + p.price.toFixed(2) + '</div>';
        html += '</div>';
        html += '<div class="product-price">';
        html += '<div class="product-price-usd">$' + subtotal.toFixed(2) + '</div>';
        html += '<div class="total-bs">Bs. ' + subtotalBs.toFixed(2) + '</div>';
        html += '</div>';
        html += '<button class="btn-delete" onclick="deleteProduct(' + p.id + ')">x</button>';
        html += '</div>';
    });
    
    container.innerHTML = html;
}

// Toggle producto
function toggleProduct(id) {
    const product = products.find(function(p) { return p.id === id; });
    if (product) {
        product.checked = !product.checked;
        saveProducts();
        updateTotals();
    }
}

// Eliminar producto
function deleteProduct(id) {
    products = products.filter(function(p) { return p.id !== id; });
    saveProducts();    renderProducts();
    updateTotals();
    showToast('Producto eliminado');
}

// Borrar lista
function clearList() {
    if (products.length === 0) return;
    if (confirm('Borrar toda la lista?')) {
        products = [];
        saveProducts();
        renderProducts();
        updateTotals();
        showToast('Lista borrada');
    }
}

// Guardar en localStorage
function saveProducts() {
    try {
        localStorage.setItem('market_products', JSON.stringify(products));
        console.log('Productos guardados:', products.length);
    } catch (e) {
        console.error('Error guardando:', e);
    }
}

// Cargar desde localStorage
function loadProducts() {
    try {
        const saved = localStorage.getItem('market_products');
        console.log('Productos guardados:', saved);
        if (saved) {
            products = JSON.parse(saved);
            renderProducts();
            updateTotals();
        }
    } catch (e) {
        console.error('Error cargando:', e);
    }
}

// Actualizar totales
function updateTotals() {
    const section = document.getElementById('totalsSection');
    const level = parseInt(document.getElementById('casheaLevel').value);
    const userPercent = CASHEA_LEVELS[level];
    const casheaPercent = 1 - userPercent;
    
    if (products.length === 0) {        section.style.display = 'none';
        return;
    }
    
    section.style.display = 'block';
    
    const checked = products.filter(function(p) { return p.checked; })
        .reduce(function(sum, p) { return sum + (p.qty * p.price); }, 0);
    
    const userUsd = checked * userPercent;
    const casheaUsd = checked * casheaPercent;
    
    document.getElementById('totalUsd').textContent = '$' + checked.toFixed(2);
    document.getElementById('totalBs').textContent = 'Bs. ' + (checked * dollarRate).toFixed(2);
    document.getElementById('checkedUsd').textContent = '$' + checked.toFixed(2);
    document.getElementById('checkedBs').textContent = 'Bs. ' + (checked * dollarRate).toFixed(2);
    document.getElementById('casheaUsd').textContent = '$' + casheaUsd.toFixed(2);
    document.getElementById('casheaBs').textContent = 'Bs. ' + (casheaUsd * dollarRate).toFixed(2);
    document.getElementById('userPayUsd').textContent = '$' + userUsd.toFixed(2);
    document.getElementById('userPayBs').textContent = 'Bs. ' + (userUsd * dollarRate).toFixed(2);
}

// Mostrar toast
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(function() {
        toast.classList.remove('show');
    }, 2500);
}
</script>

</body>
</html>
